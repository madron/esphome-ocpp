# Secrets are provided by ./esphome-wrapper from an external SOPS file.
# The decrypted secrets.yaml is created only in a temporary directory outside this repository.
substitutions:
  name: ocpp
  static_ip: !secret static_ip
  ota_password_new: !secret ota_password

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf
    version: recommended

esphome:
  name: ${name}
  on_boot:
    - lambda: |-
        id(ota_id).set_auth_password("${ota_password_new}");


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  manual_ip:
    static_ip: ${static_ip}
    gateway: !secret gateway
    subnet: !secret subnet
    dns1: !secret dns1


logger:

ota:
  id: ota_id
  platform: esphome
  password: ${ota_password_new}

preferences:
  flash_write_interval: 1d

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Rome


external_components:
  - components: [ ocpp ]
    source:
      type: local
      path: ./esphome/components

ocpp:
  id: ocpp_server
  site:
    phases: 3
    voltage: 230
    drawn_current:
      name: site_drawn_current
      l1: site_drawn_current_l1
      l2: site_drawn_current_l2
      l3: site_drawn_current_l3
    grid:
      max_current: 32
      max_power: 10000
      max_phase_imbalance: 6000
      # power

  chargers:
    - id: garage
      charge_point_id: A99999
      max_current: 16
      phases: 3
      drawn_current:
        name: charger_drawn_current
      connectors:
        - id: 1
          current_limit:
            name: connector_current_limit
            min_value: 6
            max_value: 16
            step: 0.5
          available_current:
            name: connector_available_current
          allocated_current:
            name: connector_allocated_current
          drawn_current:
            name: connector_drawn_current
            l1: connector_drawn_current_l1
            l2: connector_drawn_current_l2
            l3: connector_drawn_current_l3
          power:
            name: connector_power
          restart:
            name: connector_restart
          enabled:
            name: connector_enabled
