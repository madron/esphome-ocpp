ocpp:
  id: ocpp_id
  site:
    phases: 3
    phase_voltage: 230

  charge_points:
    - id: garage
      charge_point_id: A99999
      phases: 3
      phase_mapping: [1, 2, 3]
      max_current: 32
      debug_ocpp_messages: true
      debug_ocpp_exclude_actions:
        - MeterValues
      startup_notifications_delay: 5
      # protocol:
      #   name: garage_protocol
      # online:
      #   name: garage_online
      # charger_info:
      #   name: garage_charger_info
      connectors:
        - id: garage_1
          connector_id: 1
          phase_mapping: [1, 2, 3]
          log_meter_values: true
          # Status
          status:
            name: status
            web_server:
              sorting_group_id: sorting_group_status
              sorting_weight: 10
          plugged:
            name: plugged
            web_server:
              sorting_group_id: sorting_group_status
              sorting_weight: 11
          active_transaction:
            name: active_transaction
            web_server:
              sorting_group_id: sorting_group_status
              sorting_weight: 12
          active_phases:
            name: active_phases
            web_server:
              sorting_group_id: sorting_group_status
              sorting_weight: 13
          error:
            name: error
            web_server:
              sorting_group_id: sorting_group_status
              sorting_weight: 19
          # Control
          current_limit:
            name: current_limit
            web_server:
              sorting_group_id: sorting_group_control
              sorting_weight: 10
          control_current:
            name: control_current
            web_server:
              sorting_group_id: sorting_group_control
              sorting_weight: 30
          # requested_current:
          #   name: requested_current
          #   web_server:
          #     sorting_group_id: sorting_group_control
          #     sorting_weight: 20
          # needed_current_l1:
          #   name: needed_current_l1
          #   web_server:
          #     sorting_group_id: sorting_group_control
          #     sorting_weight: 40
          # needed_current_l2:
          #   name: needed_current_l2
          #   web_server:
          #     sorting_group_id: sorting_group_control
          #     sorting_weight: 40
          # needed_current_l3:
          #   name: needed_current_l3
          #   web_server:
          #     sorting_group_id: sorting_group_control
          #     sorting_weight: 40
          # Values
          current_l1:
            name: current_l1
            web_server:
              sorting_group_id: sorting_group_values
              sorting_weight: 10
          current_l2:
            name: current_l2
            web_server:
              sorting_group_id: sorting_group_values
              sorting_weight: 10
          current_l3:
            name: current_l3
            web_server:
              sorting_group_id: sorting_group_values
              sorting_weight: 10
          power:
            name: power
            web_server:
              sorting_group_id: sorting_group_values
              sorting_weight: 20
          # total_energy:
          #   name: 51_total_energy
          # session_time:
          #   name: 61_session_time
          # session_energy:
          #  name: 62_session_energy
          # voltage_l1:
          #   name: 71_voltage_l1
          # voltage_l2:
          #   name: 72_voltage_l2
          # voltage_l3:
          #   name: 73_voltage_l3
    - id: unknown
      phases: 3
      max_current: 32
      debug_ocpp_messages: true
