# Secrets are provided by ./esphome-wrapper from an external SOPS file.
# The decrypted secrets.yaml is created only in a temporary directory outside this repository.
substitutions:
  name: ocpp
  static_ip: !secret static_ip

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf
    version: recommended

esphome:
  name: ${name}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  manual_ip:
    static_ip: ${static_ip}
    gateway: !secret gateway
    subnet: !secret subnet
    dns1: !secret dns1

logger:

api:
  reboot_timeout: 0s

preferences:
  flash_write_interval: 1d

web_server:
  version: 3
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  sorting_groups:
    - id: sorting_group_status
      name: "Status"
      sorting_weight: 10
    - id: sorting_group_control
      name: "Control"
      sorting_weight: 20
    - id: sorting_group_values
      name: "Values"
      sorting_weight: 30


external_components:
  - components: [ ocpp ]
    source:
      type: local
      path: ./esphome/components

