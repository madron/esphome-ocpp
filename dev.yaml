mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  reboot_timeout: 0s
  keepalive: 5s


sensor:
  - platform: mqtt_subscribe
    id: grid_power_l1
    name: grid_power_l1
    topic: inverter/sensor/grid_power_a/state
    device_class: power
    unit_of_measurement: "W"
    accuracy_decimals: 0
    filters:
      - multiply: -1
  - platform: mqtt_subscribe
    id: grid_power_l2
    name: grid_power_l2
    topic: inverter/sensor/grid_power_b/state
    device_class: power
    unit_of_measurement: "W"
    accuracy_decimals: 0
    filters:
      - multiply: -1
  - platform: mqtt_subscribe
    id: grid_power_l3
    name: grid_power_l3
    topic: inverter/sensor/grid_power_c/state
    device_class: power
    unit_of_measurement: "W"
    accuracy_decimals: 0
    filters:
      - multiply: -1
  - platform: mqtt_subscribe
    id: storage_power
    name: storage_power
    topic: inverter/sensor/battery_power/state
    device_class: power
    unit_of_measurement: "W"
    accuracy_decimals: 0
  - platform: mqtt_subscribe
    id: storage_energy
    name: storage_energy
    topic: inverter/sensor/battery_energy_kwh/state
    device_class: energy
    unit_of_measurement: "kWh"
    accuracy_decimals: 1


ocpp:
  id: ocpp_server
  site:
    phases: 3
    voltage: 230
    drawn_current:
      name: site_drawn_current
      l1: site_drawn_current_l1
      l2: site_drawn_current_l2
      l3: site_drawn_current_l3
    grid:
      max_current: 32
      max_power: 10000
      max_phase_imbalance: 6000
      # power

  chargers:
    - id: garage
      charge_point_id: A99999
      max_current: 16
      phases: 3
      drawn_current:
        name: charger_drawn_current
      connectors:
        - id: 1
          current_limit:
            name: connector_current_limit
            min_value: 6
            max_value: 16
            step: 0.5
          available_current:
            name: connector_available_current
          allocated_current:
            name: connector_allocated_current
          drawn_current:
            name: connector_drawn_current
            l1: connector_drawn_current_l1
            l2: connector_drawn_current_l2
            l3: connector_drawn_current_l3
          power:
            name: connector_power
          restart:
            name: connector_restart
          enabled:
            name: connector_enabled
