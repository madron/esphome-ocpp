ocpp:
  id: ocpp_id

  charge_points:
    - id: garage
      charge_point_id: A99999
      max_current: 32
      debug_ocpp_messages: true
      startup_notifications_delay: 5
      protocol:
        name: garage_protocol
      online:
        id: garage_online
        name: garage_online
      charger_info:
        id: garage_charger_info
        name: garage_charger_info
      connectors:
        - id: garage_1
          connector_id: 1
          status:
            name: garage_status
          error:
            name: garage_error
          current:
            name: garage_current
          current_limit:
            name: garage_current_limit
          current_control:
            name: garage_current_control
          power:
            name: garage_power
          energy:
            name: garage_energy
          voltage:
            name: garage_voltage
    - id: unknown
      max_current: 32
      debug_ocpp_messages: true
